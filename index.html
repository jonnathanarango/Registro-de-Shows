<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEITAN - Registro Profesional de Artistas</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --rolex-green: #006039;
  --rolex-gold: #B8860B;
  --rolex-soft-gold: #D4AF37;
  --rolex-silver: #E5E5E5;
  --rolex-black: #0d0d0d;
  --rolex-card: #141414;
}

body {
  font-family: 'Montserrat', sans-serif;
  background: var(--rolex-black);
  color: var(--rolex-silver);
  margin: 0;
  padding: 20px;
  background-image: radial-gradient(circle at top right, #002e1b 0%, #0d0d0d 60%);
}

.container { max-width: 1400px; margin: auto; }

.title {
  font-family: 'Cinzel', serif;
  font-size: 48px;
  color: var(--rolex-gold);
  text-align: center;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  margin-bottom: 5px;
  letter-spacing: 3px;
}

.subtitle {
  text-align: center;
  color: var(--rolex-soft-gold);
  font-weight: 300;
  letter-spacing: 5px;
  margin-bottom: 40px;
  text-transform: uppercase;
  font-size: 14px;
}

.card {
  background: var(--rolex-card);
  border: 1px solid rgba(184, 134, 11, 0.3);
  padding: 25px;
  border-radius: 12px;
  margin-bottom: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h3 {
  color: var(--rolex-gold);
  border-bottom: 1px solid var(--rolex-green);
  padding-bottom: 10px;
  margin-top: 0;
  font-family: 'Cinzel', serif;
}

input, textarea, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 6px;
  background: #1a1a1a;
  color: white;
  border: 1px solid #333;
  font-family: 'Montserrat', sans-serif;
  transition: border 0.3s;
}

input:focus { border: 1px solid var(--rolex-gold); outline: none; }

button {
  background: var(--rolex-green);
  color: white;
  border: 1px solid var(--rolex-gold);
  padding: 12px 20px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all 0.3s;
}

button:hover {
  background: #004d2e;
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 8px;
  margin-top: 15px;
}

th {
  background: var(--rolex-green);
  color: var(--rolex-gold);
  padding: 15px;
  text-transform: uppercase;
  font-size: 12px;
  letter-spacing: 1px;
}

td {
  background: #1c1c1c;
  padding: 15px;
  border-top: 1px solid #2a2a2a;
  border-bottom: 1px solid #2a2a2a;
}

td:first-child { border-left: 1px solid #2a2a2a; border-radius: 8px 0 0 8px; }
td:last-child { border-right: 1px solid #2a2a2a; border-radius: 0 8px 8px 0; }

.kpis {
  display: flex;
  gap: 20px;
  margin-bottom: 30px;
}

.kpi {
  flex: 1;
  background: linear-gradient(145deg, #141414, #0a0a0a);
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  border: 1px solid rgba(184, 134, 11, 0.2);
}

.kpi div:first-child { color: var(--rolex-silver); font-size: 13px; text-transform: uppercase; }

.num {
  font-size: 32px;
  color: var(--rolex-gold);
  font-weight: 700;
  font-family: 'Cinzel', serif;
  margin-top: 5px;
}

.fecha-item {
  display: inline-block;
  background: var(--rolex-green);
  color: white;
  padding: 5px 15px;
  margin: 5px;
  border-radius: 20px;
  font-size: 12px;
  border: 1px solid var(--rolex-gold);
}

.paid { color: #00ff88; font-weight: bold; }
.pending { color: #ff4d4d; font-weight: bold; }

.modal {
  display: none;
  position: fixed;
  top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.85);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: var(--rolex-card);
  padding: 40px;
  border: 2px solid var(--rolex-gold);
  border-radius: 15px;
  width: 90%;
  max-width: 500px;
}

.footer {
  text-align: center;
  margin-top: 60px;
  padding: 30px;
  color: var(--rolex-gold);
  font-size: 14px;
  border-top: 1px solid rgba(184, 134, 11, 0.3);
  font-family: 'Cinzel', serif;
}
</style>
</head>
<body>
<div class="container">
<h1 class="title">REGISTRO DE ARTISTAS</h1>
<div class="subtitle">Excelencia en Gestion Profesional</div>

<div class="kpis">
<div class="kpi"><div>Total Artistas</div><div id="k1" class="num">0</div></div>
<div class="kpi"><div>Total Shows</div><div id="k2" class="num">0</div></div>
<div class="kpi"><div>Ingresos</div><div id="k3" class="num">$0</div></div>
<div class="kpi"><div>Pendientes</div><div id="k4" class="num">0</div></div>
</div>

<div class="card">
<h3>Nuevo Registro de Prestigio</h3>
<div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
  <input type="text" id="artista" placeholder="Nombre del artista">
  <input type="text" id="nombreShow" placeholder="Nombre del Show / Evento">
  <input type="number" id="valorIndividual" placeholder="Valor por cada show ($)" value="50000">
</div>
<div style="display:flex; gap:10px;">
  <input type="date" id="fecha" style="flex:1">
  <button onclick="agregarFecha()">Añadir Fecha</button>
</div>
<div id="listaFechas"></div>
<textarea id="obs" placeholder="Observaciones / Detalles adicionales"></textarea>
<button onclick="guardarRegistro()" style="width:100%; background: linear-gradient(to bottom, #B8860B, #8B6508); color: white; border:none;">Confirmar Registro</button>
</div>

<div class="card">
<input type="text" id="buscar" placeholder="Filtrar por artista o evento..." onkeyup="render()">
<table>
<thead>
<tr>
<th>#</th><th>Artista</th><th>Evento</th><th>Fechas</th><th>Multa</th><th>Total</th><th>Estado</th><th>Gestion</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
<br>
<button onclick="exportarExcel()" style="background:#1a1a1a; border: 1px solid var(--rolex-gold);">Exportar Reporte</button>
</div>

<!-- Modal Admin Mejorado -->
<div id="modalAdmin" class="modal">
  <div class="modal-content">
    <h3 id="modalTitulo">Gestion de Administrador</h3>
    <label style="color:var(--rolex-gold); font-size:12px;">MULTA / DESCUENTO ($):</label>
    <input type="number" id="multaAdmin" placeholder="0">
    <hr style="border-color:var(--rolex-green); margin:15px 0;">
    <label style="color:var(--rolex-gold); font-size:12px;">CALENDARIO:</label>
    <div style="display:flex; gap:10px;">
      <input type="date" id="inputFechaAdmin" style="flex:1">
      <button onclick="pushFechaAdmin()">+</button>
    </div>
    <div id="listaFechasAdmin" style="margin:15px 0;"></div>
    <div style="display:flex; gap:10px;">
      <button onclick="confirmarCambiosAdmin()" style="flex:1">Aplicar Cambios</button>
      <button onclick="cerrarModal()" style="background:#444; border-color:#666">Cerrar</button>
    </div>
  </div>
</div>

<div class="footer">
Autor <b>Jonnathan Arango</b>
</div>
</div>

<script>
const CLAVE="030609";
let datos=JSON.parse(localStorage.getItem("neitan_pro_v4")||"[]");
let fechasSeleccionadas=[];
let currentEditIndex = -1;
let fechasTempAdmin = [];

function save(){
 localStorage.setItem("neitan_pro_v4",JSON.stringify(datos));
}

function agregarFecha(){
 let fInput = document.getElementById("fecha");
 if(!fInput.value)return;
 if(!fechasSeleccionadas.includes(fInput.value)){
   fechasSeleccionadas.push(fInput.value);
 }
 pintarFechas();
 fInput.value="";
}

function pintarFechas(){
 document.getElementById("listaFechas").innerHTML=fechasSeleccionadas.map((f,i)=>
 `<span class="fecha-item">${f} <a href="#" onclick="eliminarFecha(${i})" style="color:white; text-decoration:none; margin-left:10px">✕</a></span>`
 ).join("");
}

function eliminarFecha(i){
 fechasSeleccionadas.splice(i,1);
 pintarFechas();
}

function guardarRegistro(){
 let art = document.getElementById("artista");
 let showNom = document.getElementById("nombreShow");
 let valInd = document.getElementById("valorIndividual");
 let obsArea = document.getElementById("obs");

 if(!art.value || fechasSeleccionadas.length===0){
   alert("Se requiere nombre del artista y al menos una fecha.");
   return;
 }

 let vShow = parseFloat(valInd.value) || 0;
 let vMulta = 0;

 datos.push({
   id:Date.now(),
   artista:art.value,
   nombreShow: showNom.value || "Evento Sin Nombre",
   fechas:[...fechasSeleccionadas],
   obs:obsArea.value,
   valorUnitario: vShow,
   multa: vMulta,
   valor:(fechasSeleccionadas.length * vShow) - vMulta,
   estado:"Pendiente",
   factura:"FAC-"+String(datos.length+1).padStart(6,"0")
 });

 save();
 art.value=""; showNom.value=""; valInd.value="50000"; obsArea.value=""; fechasSeleccionadas=[];
 pintarFechas();
 render();
}

function render(){
 let query=(document.getElementById("buscar").value||"").toLowerCase();
 let html="";

 datos.forEach((r,i)=>{
   if(query && !r.artista.toLowerCase().includes(query) && !r.nombreShow.toLowerCase().includes(query)) return;

   html+=`
   <tr>
   <td>${i+1}</td>
   <td><b style="color:var(--rolex-gold)">${r.artista}</b></td>
   <td>${r.nombreShow}</td>
   <td style="font-size:0.85em">${r.fechas.join("<br>")}</td>
   <td style="color:#ff4d4d">$${(r.multa||0).toLocaleString('es-CO')}</td>
   <td style="color:var(--rolex-soft-gold)"><b>$${r.valor.toLocaleString('es-CO')}</b></td>
   <td class="${r.estado=='Pagado'?'paid':'pending'}">${r.estado}</td>
   <td>
   <button onclick="cambiarEstado(${i})" style="padding:5px 10px; font-size:10px">Pago</button>
   <button onclick="abrirModalAdmin(${i})" style="padding:5px 10px; font-size:10px; background:var(--rolex-soft-gold); color:black">Admin</button>
   <button onclick="pdf(${i})" style="padding:5px 10px; font-size:10px; background:#B8860B">PDF</button>
   <button onclick="eliminar(${i})" style="padding:5px 10px; font-size:10px; background:#444">Borrar</button>
   </td>
   </tr>`;
 });

 document.getElementById("tb").innerHTML=html;

 document.getElementById("k1").innerText=datos.length;
 document.getElementById("k2").innerText=datos.reduce((a,b)=>a+b.fechas.length,0);
 document.getElementById("k3").innerText="$"+datos.reduce((a,b)=>a+b.valor,0).toLocaleString('es-CO');
 document.getElementById("k4").innerText=datos.filter(x=>x.estado!="Pagado").length;
}

function eliminar(i){
 let c=prompt("Clave de Administrador:");
 if(c!==CLAVE) return alert("Clave Incorrecta");
 if(confirm("¿Eliminar permanentemente?")){
  datos.splice(i,1);
  save(); render();
 }
}

function cambiarEstado(i){
 let c=prompt("Validaci3n Admin:");
 if(c!==CLAVE)return;
 datos[i].estado=datos[i].estado==="Pagado"?"Pendiente":"Pagado";
 save(); render();
}

function abrirModalAdmin(i){
 let c=prompt("Clave para acceder a Gesti3n de Multas y Fechas:");
 if(c!==CLAVE) return alert("Acceso Denegado");

 currentEditIndex = i;
 fechasTempAdmin = [...datos[i].fechas];
 document.getElementById("multaAdmin").value = datos[i].multa || 0;
 document.getElementById("modalTitulo").innerText = "Gesti3n: " + datos[i].artista;
 document.getElementById("modalAdmin").style.display = "flex";
 pintarFechasAdmin();
}

function cerrarModal(){ document.getElementById("modalAdmin").style.display = "none"; }

function pushFechaAdmin(){
 let val = document.getElementById("inputFechaAdmin").value;
 if(val && !fechasTempAdmin.includes(val)){ fechasTempAdmin.push(val); pintarFechasAdmin(); }
}

function popFechaAdmin(idx){ fechasTempAdmin.splice(idx, 1); pintarFechasAdmin(); }

function pintarFechasAdmin(){
 document.getElementById("listaFechasAdmin").innerHTML = fechasTempAdmin.map((f,idx) =>
  `<div class="fecha-item">${f} <a href="#" onclick="popFechaAdmin(${idx})" style="color:white; margin-left:10px">✕</a></div>`
 ).join("");
}

function confirmarCambiosAdmin(){
 let mVal = parseFloat(document.getElementById("multaAdmin").value) || 0;
 datos[currentEditIndex].fechas = [...fechasTempAdmin];
 datos[currentEditIndex].multa = mVal;

 let unitario = datos[currentEditIndex].valorUnitario || 50000;
 datos[currentEditIndex].valor = (datos[currentEditIndex].fechas.length * unitario) - mVal;

 save(); render(); cerrarModal();
}

async function pdf(i){
 const r=datos[i];
 const {jsPDF}=window.jspdf; const doc=new jsPDF();
 const pageWidth = doc.internal.pageSize.getWidth();

 doc.setFont("helvetica", "bold"); doc.setFontSize(26); doc.setTextColor(184, 134, 11);
 doc.text("REGISTRO DE ARTISTAS", pageWidth / 2, 35, {align: "center"});

 doc.setFontSize(14); doc.setTextColor(100);
 doc.text("CUENTA DE COBRO PROFESIONAL", pageWidth / 2, 45, {align: "center"});

 doc.setFontSize(16); doc.setTextColor(0);
 doc.text(r.artista.toUpperCase(), pageWidth / 2, 70, {align: "center"});
 doc.text("Servicio: " + r.nombreShow, pageWidth / 2, 80, {align: "center"});

 doc.setFontSize(12); doc.text("Factura: " + r.factura, pageWidth / 2, 90, {align: "center"});

 let y = 110;
 doc.text("CRONOGRAMA:", 40, y); y+=10;
 r.fechas.forEach(f => { doc.text("- "+f, 50, y); y+=8; });

 y+=10;
 doc.text("Subtotal: $" + (r.fechas.length * r.valorUnitario).toLocaleString('es-CO'), 40, y); y+=10;
 doc.setTextColor(200, 0, 0);
 doc.text("Multas/Descuentos: -$" + (r.multa||0).toLocaleString('es-CO'), 40, y); y+=15;

 doc.setFontSize(22); doc.setTextColor(184, 134, 11);
 doc.text("TOTAL NETO: $" + r.valor.toLocaleString('es-CO'), pageWidth / 2, y, {align: "center"});

 y += 40;
 doc.setDrawColor(0);
 doc.setLineWidth(0.5);

 doc.line(30, y, 90, y);
 doc.line(pageWidth - 90, y, pageWidth - 30, y);

 y += 7;
 doc.setFontSize(10);
 doc.setTextColor(0);
 

 doc.text("AUTORIZA PAGO", pageWidth - 60, y, {align: "center"});
 doc.text("FIRMA DEL ARTISTA", 60, y, {align: "center"});
 

 doc.save(r.factura + "_" + r.artista + ".pdf");
}

function exportarExcel(){
 const ws=XLSX.utils.json_to_sheet(datos.map(x=>({
  Factura:x.factura, Artista:x.artista, Show:x.nombreShow, Cant:x.fechas.length, Multa:x.multa, Total:x.valor, Estado:x.estado
 })));
 const wb=XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(wb,ws,"Artistas");
 XLSX.writeFile(wb,"Reporte_Profesional_Artistas.xlsx");
}

render();
</script>
</body>
</html>
